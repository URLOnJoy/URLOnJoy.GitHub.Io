<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>URLOnJoy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 { text-align: center; }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover { background: #2563eb; }

    .box {
      margin-top: 15px;
      padding: 12px;
      background: #020617;
      border-radius: 8px;
      font-size: 0.9em;
    }

    .link {
      color: #60a5fa;
      word-break: break-all;
    }

    .warn {
      color: #facc15;
      font-size: 0.8em;
      margin-top: 8px;
    }

    .actions button {
      margin-top: 6px;
      background: #334155;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>URLOnJoy</h2>

  <input id="shortName" placeholder="Short name (optional)" />
  <input id="longUrl" placeholder="https://example.com" />

  <select id="mode">
    <option value="download">Download .url file</option>
    <option value="link">Get hosted short URL</option>
  </select>

  <button onclick="generate()">Short That URL!</button>

  <div id="output"></div>
</div>

<script>
function randomID(length = 9) {
  const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  return Array.from({length}, () => chars[Math.floor(Math.random()*chars.length)]).join("");
}

function isValidURL(str) {
  try { new URL(str); return true; }
  catch { return false; }
}

function generate() {
  let name = document.getElementById("shortName").value.trim();
  let url = document.getElementById("longUrl").value.trim();
  const mode = document.getElementById("mode").value;

  if (!url) return alert("Enter a URL");

  if (!url.startsWith("http")) url = "https://" + url;
  if (!isValidURL(url)) return alert("Invalid URL");

  if (!name) name = randomID();

  const content = `[InternetShortcut]\nURL=${url}`;
  const shortLink = `https://urlonjoy.github.io/${name}.url`;

  let html = `<div class="box">`;

  // DOWNLOAD MODE
  if (mode === "download") {
    const blob = new Blob([content], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name + ".url";
    a.click();

    html += `
      ✅ <b>${name}.url</b> downloaded<br>
      <div class="link">${url}</div>
    `;
  }

  // HOSTED MODE (CURATED)
  if (mode === "link") {
    html += `
      🌐 <b>Your reserved short URL:</b><br>
      <div class="link">${shortLink}</div>

      <div class="warn">
        ⚠️ This link will NOT work until it is added to URLOnJoy.
      </div>

      <div class="warn">
        Submit it here to request activation:<br>
        https://forms.gle/eCKmsnhEmd2Kmzj86
      </div>

      <div class="actions">
        <button onclick="navigator.clipboard.writeText('${shortLink}')">Copy Link</button>
      </div>
    `;
  }

  html += `</div>`;

  document.getElementById("output").innerHTML = html;
}

// Enter key support
document.addEventListener("keydown", e => {
  if (e.key === "Enter") generate();
});
</script>

</body>
</html>
