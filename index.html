<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>URLOnJoy Shortener</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .preview {
      margin-top: 15px;
      font-size: 0.9em;
      color: #94a3b8;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>URLOnJoy</h2>

  <input id="shortName" placeholder="Short name (optional)" />
  <input id="longUrl" placeholder="https://example.com/very/long/link" />

  <select id="mode">
    <option value="download">Download .url file</option>
    <option value="link">Get hosted short URL</option>
  </select>

  <button onclick="generate()">Short That URL!</button>

  <div class="preview" id="preview"></div>
</div>

<script>
function randomID(length = 9) {
  const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let result = "";
  for (let i = 0; i < length; i++) {
    result += chars[Math.floor(Math.random() * chars.length)];
  }
  return result;
}

function generate() {
  let name = document.getElementById("shortName").value.trim();
  let url = document.getElementById("longUrl").value.trim();
  const mode = document.getElementById("mode").value;

  if (!url) {
    alert("Please enter a URL.");
    return;
  }

  // Auto-generate ID if blank
  if (!name) {
    name = randomID();
  }

  // Fix URL
  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "https://" + url;
  }

  const content = `[InternetShortcut]\nURL=${url}`;

  // MODE 1: Download file
  if (mode === "download") {
    const blob = new Blob([content], { type: "text/plain" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = name + ".url";
    link.click();

    document.getElementById("preview").innerText =
      `Downloaded: ${name}.url → ${url}`;
  }

  // MODE 2: Hosted short URL (display only)
  if (mode === "link") {
    const shortLink = `https://urlonjoy.github.io/${name}.url`;

    document.getElementById("preview").innerHTML =
      `Short URL:<br><a href="${shortLink}" target="_blank" style="color:#60a5fa">${shortLink}</a><br><br>
      ⚠️ Note: You must host the .url file on your GitHub Pages repo for this to work.`;
  }
}
</script>

</body>
</html>
